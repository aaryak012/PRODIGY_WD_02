<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Stopwatch</h1>
    <div class="time-display" id="timeDisplay">00:00:00.000</div>
    <div class="controls">
      <button id="startStopBtn" class="btn primary">Start</button>
      <button id="lapBtn" class="btn" disabled>Lap</button>
      <button id="resetBtn" class="btn" disabled>Reset</button>
    </div>
    <section class="laps">
      <h2>Lap Times</h2>
      <ol id="lapsList"></ol>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
